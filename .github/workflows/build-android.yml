name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Install dependencies
        run: npm ci

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_PUBLIC_API_URL: http://46.103.38.189

      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore android/app/release.keystore \
            -alias moydrug \
            -keyalg RSA \
            -keysize 2048 \
            -validity 3650 \
            -dname "CN=MoyDrug, O=MoyDrug, C=RU" \
            -storepass moydrug123 \
            -keypass moydrug123

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Increase JVM memory
        run: echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g" >> android/gradle.properties

      - name: Build Release APK
        working-directory: android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -x lintVitalAnalyzeRelease \
            -x lintAnalyzeRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/android/app/release.keystore \
            -Pandroid.injected.signing.store.password=moydrug123 \
            -Pandroid.injected.signing.key.alias=moydrug \
            -Pandroid.injected.signing.key.password=moydrug123

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: moydrug-v2-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14
